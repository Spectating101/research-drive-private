name: Runtime contracts

on:
  pull_request:
    paths:
      - "drive/src/v2/**"
      - "scripts/yzu_cluster/**"
      - "tests/test_yzu_interop_*.py"
      - "package.json"
      - ".github/agent_patches/**"
      - ".github/workflows/runtime-contract.yml"
  push:
    branches:
      - "agent/**"
    paths:
      - "drive/src/v2/**"
      - "scripts/yzu_cluster/**"
      - "tests/test_yzu_interop_*.py"
      - "package.json"
      - ".github/agent_patches/**"
      - ".github/workflows/runtime-contract.yml"

permissions:
  contents: read

concurrency:
  group: runtime-contract-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contract-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Apply staged live contract patch
        run: python .github/agent_patches/live_contract.py

      - name: Use Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify backend orchestration contracts
        run: python -m unittest discover -s tests -p "test_yzu_interop_*.py" -v

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify frontend runtime contracts
        run: npm run test:runtime-contract

      - name: Build Research Drive
        run: npm run build

      - name: Publish verified live contract files
        uses: actions/upload-artifact@v4
        with:
          name: verified-live-contract-hardening
          path: |
            drive/src/v2/api.js
            drive/src/v2/executionLifecycle.js
            drive/src/v2/executionLifecycle.test.js
            drive/src/v2/transportContract.js
            drive/src/v2/transportContract.test.js
            package.json
          if-no-files-found: error
          retention-days: 3
