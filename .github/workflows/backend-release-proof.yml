name: Backend release proof

on:
  push:
    branches:
      - main
      - agent/release-proof-hardening-v2
    paths:
      - "drive/scripts/yzu_cluster/**"
      - "drive/scripts/cluster_agent/**"
      - "drive/scripts/research_data_mcp/**"
      - "drive/scripts/research_query_engine/**"
      - "drive/scripts/ops/backend_authority_audit.py"
      - "drive/config/yzu_cluster.json"
      - "drive/config/procurement_magic.json"
      - "drive/tests/test_network_policy.py"
      - "drive/tests/test_craft_collect.py"
      - "drive/tests/test_faculty_profile_regressions.py"
      - "drive/tests/test_hardening_gates.py"
      - "drive/tests/test_registry_readiness_truth.py"
      - "tests/test_acquisition_manifest.py"
      - "drive/scripts/ops/repo_authority_check.sh"
      - ".github/workflows/backend-release-proof.yml"
  pull_request:
    branches: [main]
    paths:
      - "drive/scripts/yzu_cluster/**"
      - "drive/scripts/cluster_agent/**"
      - "drive/scripts/research_data_mcp/**"
      - "drive/scripts/research_query_engine/**"
      - "drive/scripts/ops/backend_authority_audit.py"
      - "drive/config/yzu_cluster.json"
      - "drive/config/procurement_magic.json"
      - "drive/tests/**"
      - "tests/test_acquisition_manifest.py"
      - "drive/scripts/ops/repo_authority_check.sh"
      - ".github/workflows/backend-release-proof.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backend-release-proof:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/kernel:${{ github.workspace }}/drive

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: One-shot final invariant migration
        if: github.event_name == 'pull_request' && github.head_ref == 'agent/release-proof-hardening-v2'
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          changed = []

          runtime = Path("drive/scripts/yzu_cluster/runtime_adapter.py")
          text = runtime.read_text(encoding="utf-8")
          old = '''        # When local scrape is allowed, controller must advertise browser so
          # scraper_run jobs are claimable without a fresh Windows lab worker.
          if not operations.get("disable_local_scrape"):
              capabilities.append("browser")
          '''
          new = '''        # Browser capability is opt-in. A minimal/default controller must not
          # claim scraper work merely because the setting is absent.
          if operations.get("disable_local_scrape") is False:
              capabilities.append("browser")
          '''
          if old in text:
              runtime.write_text(text.replace(old, new, 1), encoding="utf-8")
              changed.append(str(runtime))

          router = Path("drive/scripts/research_data_mcp/http_router.py")
          text = router.read_text(encoding="utf-8")
          old = '''    # Trailing {param} may consume remaining path segments (DOI values contain '/').
              last = pat_parts[-1]
              greedy = last.startswith("{") and last.endswith("}")
          '''
          new = '''    # Only DOI values may consume remaining path segments. Treating every
              # trailing parameter as greedy lets generic resource routes swallow
              # nested actions such as /threads/{id}/discover-handoff.
              last = pat_parts[-1]
              greedy = last == "{doi}"
          '''
          if old in text:
              router.write_text(text.replace(old, new, 1), encoding="utf-8")
              changed.append(str(router))

          orchestrator_test = Path("tests/test_orchestrator_runtime.py")
          text = orchestrator_test.read_text(encoding="utf-8")
          updated = text.replace(
              '"allowed_job_types": ["http_manifest", "scraper_run"],',
              '"allowed_job_types": ["http_manifest", "scraper_run", "source_probe"],',
          )
          updated = updated.replace("https://example.test", "https://8.8.8.8")
          updated = updated.replace(
              '{"idempotency_key": ',
              '{"_ops_internal": True, "idempotency_key": ',
          )
          updated = updated.replace(
              '    orchestrator.approve(job["id"])\n    orchestrator.runtime.join_worker(',
              '    orchestrator.runtime.join_worker(',
              1,
          )
          if updated != text:
              orchestrator_test.write_text(updated, encoding="utf-8")
              changed.append(str(orchestrator_test))

          synthesis_test = Path("tests/test_synthesis_thread_state.py")
          text = synthesis_test.read_text(encoding="utf-8")
          old = '''        {"job_type": "synthesis_execute", "launchable": True, "title": "Synthesis boundary"},
          '''
          new = '''        {
              "job_type": "synthesis_execute",
              "launchable": True,
              "title": "Synthesis boundary",
              "execution_spec": {
                  "input_dataset_id": "google_trends_stablecoin_weekly",
                  "output_dataset_id": "synthesis_boundary_output",
                  "group_by": [],
                  "metrics": [{"function": "count", "as": "row_count"}],
                  "transforms": [],
              },
          },
          '''
          if old in text:
              synthesis_test.write_text(text.replace(old, new, 1), encoding="utf-8")
              changed.append(str(synthesis_test))

          if not changed:
              print("final invariant migration already applied")
              raise SystemExit(0)
          print("patched:")
          for path in changed:
              print(f"- {path}")
          PY
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            drive/scripts/yzu_cluster/runtime_adapter.py \
            drive/scripts/research_data_mcp/http_router.py \
            tests/test_orchestrator_runtime.py \
            tests/test_synthesis_thread_state.py
          git commit -m "fix(runtime): align browser, routing, and approval contracts"
          git push origin HEAD:${GITHUB_HEAD_REF}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install focused test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pandas pyarrow pyyaml requests numpy python-dotenv pydantic

      - name: Record exact head
        run: |
          mkdir -p artifacts
          git rev-parse HEAD | tee artifacts/backend-release-sha.txt
          git status --short

      - name: Compile backend authority modules
        run: |
          python -m compileall -q \
            drive/scripts/yzu_cluster \
            drive/scripts/cluster_agent \
            drive/scripts/research_data_mcp \
            drive/scripts/research_query_engine \
            drive/scripts/ops/backend_authority_audit.py

      - name: Run focused hardening contracts
        shell: bash
        run: |
          set -o pipefail
          python -m pytest -q \
            drive/tests/test_network_policy.py \
            drive/tests/test_craft_collect.py \
            drive/tests/test_faculty_profile_regressions.py \
            drive/tests/test_hardening_gates.py \
            drive/tests/test_registry_readiness_truth.py \
            tests/test_acquisition_manifest.py \
            2>&1 | tee artifacts/backend-release-tests.log

      - name: Verify hosted checkout authority
        shell: bash
        run: |
          set -euo pipefail
          {
            origin="$(git remote get-url origin)"
            case "$origin" in
              *research-drive-private*) ;;
              *) echo "FAIL unexpected origin: $origin"; exit 1 ;;
            esac
            test -f drive/docs/REPO_AUTHORITY.md
            test -f drive/docs/SOL_REMOTE_HANDOFF.md
            test -f drive/scripts/research_data_mcp/execution_policy.py
            test -f drive/scripts/yzu_cluster/acquisitions.py
            echo "OK hosted authority repository=$origin"
            echo "NOTE multi-checkout FD/SR/RI parity is proven only by the live Optiplex artifact"
          } | tee artifacts/repo-authority.log

      - name: Build strict authority inventory
        run: |
          python drive/scripts/ops/backend_authority_audit.py \
            --strict \
            --output artifacts/backend_authority_inventory.json

      - name: Build release proof manifest
        shell: bash
        run: |
          python - <<'PY'
          import hashlib
          import json
          import os
          import subprocess
          from pathlib import Path

          root = Path.cwd()
          artifacts = root / "artifacts"
          sha = subprocess.check_output(["git", "rev-parse", "HEAD"], text=True).strip()
          files = {}
          for path in sorted(artifacts.glob("*")):
              if not path.is_file() or path.name == "backend_release_proof.json":
                  continue
              files[path.name] = {
                  "bytes": path.stat().st_size,
                  "sha256": hashlib.sha256(path.read_bytes()).hexdigest(),
              }
          payload = {
              "repository": os.environ.get("GITHUB_REPOSITORY"),
              "sha": sha,
              "run_id": os.environ.get("GITHUB_RUN_ID"),
              "run_attempt": os.environ.get("GITHUB_RUN_ATTEMPT"),
              "event": os.environ.get("GITHUB_EVENT_NAME"),
              "files": files,
          }
          (artifacts / "backend_release_proof.json").write_text(
              json.dumps(payload, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Upload exact-SHA release proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-release-proof-${{ github.sha }}
          path: artifacts/
          if-no-files-found: error
          retention-days: 14
