name: Backend release proof

on:
  push:
    branches:
      - main
      - agent/release-proof-hardening
    paths:
      - "drive/scripts/yzu_cluster/**"
      - "drive/scripts/cluster_agent/**"
      - "drive/scripts/research_data_mcp/**"
      - "drive/scripts/research_query_engine/**"
      - "drive/scripts/ops/backend_authority_audit.py"
      - "drive/config/yzu_cluster.json"
      - "drive/config/procurement_magic.json"
      - "drive/tests/test_network_policy.py"
      - "drive/tests/test_craft_collect.py"
      - "drive/tests/test_faculty_profile_regressions.py"
      - "drive/tests/test_hardening_gates.py"
      - "drive/tests/test_registry_readiness_truth.py"
      - "tests/test_acquisition_manifest.py"
      - "drive/scripts/ops/repo_authority_check.sh"
      - ".github/workflows/backend-release-proof.yml"
  pull_request:
    branches: [main]
    paths:
      - "drive/scripts/yzu_cluster/**"
      - "drive/scripts/cluster_agent/**"
      - "drive/scripts/research_data_mcp/**"
      - "drive/scripts/research_query_engine/**"
      - "drive/scripts/ops/backend_authority_audit.py"
      - "drive/config/yzu_cluster.json"
      - "drive/config/procurement_magic.json"
      - "drive/tests/**"
      - "tests/test_acquisition_manifest.py"
      - "drive/scripts/ops/repo_authority_check.sh"
      - ".github/workflows/backend-release-proof.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend-release-proof:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/kernel:${{ github.workspace }}/drive

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install focused test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pandas pyarrow pyyaml requests numpy python-dotenv pydantic

      - name: Record exact head
        run: |
          mkdir -p artifacts
          git rev-parse HEAD | tee artifacts/backend-release-sha.txt
          git status --short

      - name: Compile backend authority modules
        run: |
          python -m compileall -q \
            drive/scripts/yzu_cluster \
            drive/scripts/cluster_agent \
            drive/scripts/research_data_mcp \
            drive/scripts/research_query_engine \
            drive/scripts/ops/backend_authority_audit.py

      - name: Run focused hardening contracts
        shell: bash
        run: |
          set -o pipefail
          python -m pytest -q \
            drive/tests/test_network_policy.py \
            drive/tests/test_craft_collect.py \
            drive/tests/test_faculty_profile_regressions.py \
            drive/tests/test_hardening_gates.py \
            drive/tests/test_registry_readiness_truth.py \
            tests/test_acquisition_manifest.py \
            2>&1 | tee artifacts/backend-release-tests.log

      - name: Enforce single repository authority
        run: |
          bash drive/scripts/ops/repo_authority_check.sh | tee artifacts/repo-authority.log

      - name: Build strict authority inventory
        run: |
          python drive/scripts/ops/backend_authority_audit.py \
            --strict \
            --output artifacts/backend_authority_inventory.json

      - name: Build release proof manifest
        shell: bash
        run: |
          python - <<'PY'
          import hashlib
          import json
          import os
          import subprocess
          from pathlib import Path

          root = Path.cwd()
          artifacts = root / "artifacts"
          sha = subprocess.check_output(["git", "rev-parse", "HEAD"], text=True).strip()
          files = {}
          for path in sorted(artifacts.glob("*")):
              if not path.is_file() or path.name == "backend_release_proof.json":
                  continue
              files[path.name] = {
                  "bytes": path.stat().st_size,
                  "sha256": hashlib.sha256(path.read_bytes()).hexdigest(),
              }
          payload = {
              "repository": os.environ.get("GITHUB_REPOSITORY"),
              "sha": sha,
              "run_id": os.environ.get("GITHUB_RUN_ID"),
              "run_attempt": os.environ.get("GITHUB_RUN_ATTEMPT"),
              "event": os.environ.get("GITHUB_EVENT_NAME"),
              "files": files,
          }
          (artifacts / "backend_release_proof.json").write_text(
              json.dumps(payload, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Upload exact-SHA release proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-release-proof-${{ github.sha }}
          path: artifacts/
          if-no-files-found: error
          retention-days: 14
