name: Reddit subscriber recovery

on:
  pull_request:
    branches: [main]
    paths:
      - "drive/scripts/research_data_mcp/reddit_subscriber_recovery/**"
      - ".github/workflows/private-runtime-contract.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  collect-reddit-subscriber-history:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install collector dependencies
        run: python -m pip install --upgrade requests pandas

      - name: Collect broad monthly candidate histories
        env:
          REDDIT_SUBSCRIBER_OUT: ${{ github.workspace }}/reddit-subscriber-output/broad_candidates
        run: python drive/scripts/research_data_mcp/reddit_subscriber_recovery/collect_reddit_subscribers.py

      - name: Collect reviewed daily histories and derive month-end panel
        id: reviewed_daily
        continue-on-error: true
        env:
          REDDIT_DAILY_OUT: ${{ github.workspace }}/reddit-subscriber-output/reviewed_daily
        run: |
          set -o pipefail
          python drive/scripts/research_data_mcp/reddit_subscriber_recovery/collect_reddit_daily.py 2>&1 | tee reddit-subscriber-output/reviewed_daily.log

      - name: Archive collection output and diagnostics
        if: always()
        run: |
          cd reddit-subscriber-output
          zip -r ../stablecoin-reddit-subscriber-history-reviewed.zip . ../reddit-subscriber-output/reviewed_daily.log

      - name: Upload subscriber-history artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stablecoin-reddit-subscriber-history-reviewed
          path: stablecoin-reddit-subscriber-history-reviewed.zip
          if-no-files-found: error
          retention-days: 7

      - name: Enforce reviewed daily result
        if: steps.reviewed_daily.outcome == 'failure'
        run: exit 1
