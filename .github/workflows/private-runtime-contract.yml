name: Reddit subscriber recovery

on:
  pull_request:
    branches: [main]
    paths:
      - "drive/scripts/research_data_mcp/reddit_subscriber_recovery/**"
      - ".github/workflows/private-runtime-contract.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  collect-reddit-subscriber-history:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install collector dependencies
        run: python -m pip install --upgrade requests pandas

      - name: Collect Arctic Shift monthly subscriber histories
        env:
          REDDIT_SUBSCRIBER_OUT: ${{ github.workspace }}/reddit-subscriber-output
        run: python drive/scripts/research_data_mcp/reddit_subscriber_recovery/collect_reddit_subscribers.py

      - name: Archive collection output
        run: |
          cd reddit-subscriber-output
          zip -r ../stablecoin-reddit-subscriber-history.zip .

      - name: Upload subscriber-history artifact
        uses: actions/upload-artifact@v4
        with:
          name: stablecoin-reddit-subscriber-history
          path: stablecoin-reddit-subscriber-history.zip
          if-no-files-found: error
          retention-days: 7
