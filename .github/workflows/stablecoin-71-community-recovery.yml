name: Stablecoin 71 community recovery

on:
  pull_request:
    branches: [main]
    paths:
      - "drive/scripts/research_data_mcp/stablecoin_71_community/**"
      - ".github/workflows/stablecoin-71-community-recovery.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade requests

      - name: Probe corrected historical community snapshots
        env:
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
          STABLECOIN_71_FAST_OUT: ${{ github.workspace }}/stablecoin-71-fast-output
        run: python drive/scripts/research_data_mcp/stablecoin_71_community/probe_history_fast.py

      - name: Archive output
        if: always()
        run: zip -r stablecoin-71-history-probe.zip stablecoin-71-fast-output

      - name: Upload dataset artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stablecoin-71-history-probe
          path: stablecoin-71-history-probe.zip
          if-no-files-found: error
          retention-days: 7
