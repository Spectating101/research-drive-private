name: Patch worker public URL fixtures

on:
  push:
    branches: [agent/release-proof-hardening-v2]
    paths: [.github/workflows/worker-fixture-patch.yml]

permissions:
  contents: write

jobs:
  patch-fixtures:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/release-proof-hardening-v2
          fetch-depth: 0

      - name: Replace non-resolving worker fixtures
        run: |
          python - <<'PY'
          from pathlib import Path

          paths = [
              Path("tests/test_worker_control.py"),
              Path("tests/test_worker_completion_lease.py"),
              Path("tests/test_completion_lease_scope.py"),
              Path("tests/test_artifact_streaming.py"),
              Path("tests/test_live_identity.py"),
              Path("tests/test_remote_claim_isolation.py"),
          ]
          replacements = 0
          for path in paths:
              text = path.read_text(encoding="utf-8")
              count = text.count("https://example.test")
              if count:
                  path.write_text(text.replace("https://example.test", "https://8.8.8.8"), encoding="utf-8")
                  replacements += count
          if replacements != 10:
              raise SystemExit(f"expected 10 worker fixture replacements, got {replacements}")
          print(f"patched {replacements} public URL fixtures")
          PY

      - name: Commit fixture repair
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            tests/test_worker_control.py \
            tests/test_worker_completion_lease.py \
            tests/test_completion_lease_scope.py \
            tests/test_artifact_streaming.py \
            tests/test_live_identity.py \
            tests/test_remote_claim_isolation.py
          git commit -m "test(runtime): use resolvable public worker fixtures"
          git push origin HEAD:agent/release-proof-hardening-v2
